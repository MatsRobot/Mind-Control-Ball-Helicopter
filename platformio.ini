[env:micro]
platform = atmelavr
board = micro
framework = arduino

; Serial monitor speed matching your code's USB serial
monitor_speed = 57600

lib_deps =
    # Search for the LiquidCrystal I2C library by Frank de Brabander
    # which supports the initialization format you used
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4